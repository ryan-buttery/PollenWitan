name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.build-mode == 'manual'
        name: Build with Gradle
        shell: bash
        run: |
          keytool -genkey -v -keystore /tmp/ci-debug.jks \
            -keyalg RSA -keysize 2048 -validity 1 \
            -alias ci -storepass changeit -keypass changeit \
            -dname "CN=CI,OU=CI,O=CI,L=CI,ST=CI,C=XX"
          echo "storeFile=/tmp/ci-debug.jks" > keystore.properties
          echo "storePassword=changeit" >> keystore.properties
          echo "keyAlias=ci" >> keystore.properties
          echo "keyPassword=changeit" >> keystore.properties
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
