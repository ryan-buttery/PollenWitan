name: Build & Check
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Create CI keystore
        run: |
          keytool -genkey -v -keystore /tmp/ci-debug.jks \
            -keyalg RSA -keysize 2048 -validity 1 \
            -alias ci -storepass changeit -keypass changeit \
            -dname "CN=CI,OU=CI,O=CI,L=CI,ST=CI,C=XX"
          echo "storeFile=/tmp/ci-debug.jks" > keystore.properties
          echo "storePassword=changeit" >> keystore.properties
          echo "keyAlias=ci" >> keystore.properties
          echo "keyPassword=changeit" >> keystore.properties
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Lint
        run: ./gradlew lintDebug --no-daemon
      - name: Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
